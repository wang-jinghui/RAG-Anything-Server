version: '3.8'

services:
  # RAG-Anything Server
  rag-server:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: rag-anything-server
    ports:
      - "8000:8000"
    environment:
      # 服务器配置
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
      
      # 数据库配置
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/raganything
      - DATABASE_POOL_SIZE=10
      - DATABASE_MAX_OVERFLOW=20
      
      # JWT 配置（生产环境请修改）
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-super-secret-key-change-in-production-min-32-chars}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      
      # API Key Settings
      - API_KEY_PREFIX=rak_
      
      # CORS & Security
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8080"]
      - RATE_LIMIT_PER_MINUTE=60
      - MAX_FILE_SIZE_MB=50
      
      # LLM 配置 (使用 Ollama)
      - LLM_BINDING=ollama
      - LLM_MODEL=${LLM_MODEL:-qwen3:1.7b}
      - LLM_BINDING_HOST=${LLM_BINDING_HOST:-http://192.168.254.44:11434}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-120}
      - LLM_THINK=${LLM_THINK:-false}
      
      # Embedding 配置 (使用 Ollama)
      - EMBEDDING_BINDING=ollama
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-1024}
      - EMBEDDING_BINDING_HOST=${EMBEDDING_BINDING_HOST:-http://192.168.254.44:11434}
      - EMBEDDING_TIMEOUT=${EMBEDDING_TIMEOUT:-30}
      
      # VLM 配置 (使用 Ollama)
      - VLM_BINDING=ollama
      - VLM_MODEL=${VLM_MODEL:-qwen3-vl:8b}
      - VLM_BINDING_HOST=${VLM_BINDING_HOST:-http://192.168.254.44:11434}
      - VLM_TIMEOUT=${VLM_TIMEOUT:-120}
      
      # 向量存储配置 (使用 PostgreSQL + pgvector)
      - LIGHTRAG_VECTOR_STORAGE=PGVectorStorage
      - POSTGRES_HOST=db  # Docker 内部服务名
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin_2617}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-raganything_test}
      - POSTGRES_WORKSPACE=${POSTGRES_WORKSPACE:-default}
      
      # 图数据库配置 (使用 Neo4j)
      - LIGHTRAG_GRAPH_STORAGE=Neo4JStorage
      - NEO4J_URI=bolt://neo4j:7687  # Docker 内部服务名
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_password}
      - NEO4J_DATABASE=neo4j
      
      # MinerU 配置
      - PARSER_METHOD=mineru
      - MINERU_MODE=${MINERU_MODE:-local_api}
      - MINERU_LOCAL_API_URL=${MINERU_LOCAL_API_URL:-http://vip.xg.frp.one:39800/}
      - MINERU_OUTPUT_DIR=/app/mineru_output
      - MINERU_CONFIG=default
      - ENABLE_IMAGE_PROCESSING=true
      - ENABLE_OCR=true
      
      # LLM Cache 配置
      - ENABLE_LLM_CACHE=${ENABLE_LLM_CACHE:-false}
      
      # 向量相似度阈值
      - COSINE_THRESHOLD=${COSINE_THRESHOLD:-0.2}
      
      # RAG 配置
      - RAG_WORKING_DIR=/app/rag_storage
      - CHUNK_TOKEN_SIZE=1200
      - CHUNK_OVERLAP_TOKEN_SIZE=100
      - DEFAULT_QUERY_MODE=hybrid
      - DEFAULT_TOP_K=10
      
      # 日志配置
      - LOG_LEVEL=INFO
      - RAG_LOG_LEVEL=INFO
    volumes:
      - ./rag_storage:/app/rag_storage
      - ./temp_uploads:/app/temp_uploads
      - ./mineru_output:/app/mineru_output
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-network

  # PostgreSQL 数据库（带 pgvector 扩展）
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin_2617}
      - POSTGRES_DB=${POSTGRES_DATABASE:-raganything_test}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-network

  # Neo4j 图数据库
  neo4j:
    image: neo4j:5.26.17
    container_name: rag-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-neo4j_password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-neo4j_password}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:

networks:
  rag-network:
    driver: bridge
